<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visión IT | Detector en Tiempo Real</title>
    <link rel="stylesheet" href="style.css">
    <!-- TensorFlow.js and Models -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier"></script>
    <!-- PDF Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo">Visión IT Dashboard</div>
            <div class="header-actions">
                <button id="toggle-camera" class="icon-btn" title="Cambiar Cámara">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                        <path d="M3 3v5h5" />
                        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
                        <path d="M16 16h5v5" />
                    </svg>
                </button>
                <button id="open-settings" class="icon-btn" title="Ajustes">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.72v.18a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                </button>
            </div>
            <div id="status" class="status">Conectando...</div>
        </header>

        <main class="dashboard-layout demo-mode">
            <!-- Camera Section -->
            <section class="camera-wall">
                <div class="camera-frame">
                    <video id="video" autoplay playsinline muted></video>
                    <canvas id="canvas"></canvas>

                    <div class="camera-overlay">
                        <div class="counter-badge">
                            Detectando<span class="dot-ani"></span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Info & Controls Section -->
            <section class="info-panel demo-hidden">
                <!-- Training and Capture UI removed per Regla de Oro -->

                <!-- Reporting and Log Table removed per Regla de Oro -->
            </section>

            <!-- Detection Feedback Overlay (Demo Mode) -->
            <div id="detection-overlay" class="detection-overlay hidden">
                <div class="overlay-content">
                    <div class="overlay-header">
                        <span class="pulse-icon"></span>
                        <h3>OBJETO DETECTADO</h3>
                    </div>
                    <div class="overlay-body">
                        <div class="info-row">
                            <span class="label">Producto:</span>
                            <span id="overlay-product" class="value">---</span>
                        </div>
                        <div class="info-row">
                            <span class="label">Confianza:</span>
                            <span id="overlay-conf" class="value">0%</span>
                        </div>
                        <div class="info-row status-row">
                            <span id="overlay-status" class="status-msg">Escaneando...</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Live Event Feed (Right Sidebar for Demo Mode) -->
            <aside id="live-event-feed" class="live-event-feed">
                <div class="feed-header">
                    <h4>HISTORIAL DE DETECCIONES</h4>
                </div>
                <div id="event-list" class="event-list">
                    <!-- Events will appear here -->
                    <div class="empty-feed-msg">Esperando detecciones...</div>
                </div>
                <div class="feed-footer">
                    <button id="export-pdf-btn" class="btn-accent" style="width: 100%;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            style="margin-right: 8px;">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                            <polyline points="14 2 14 8 20 8" />
                            <line x1="16" y1="13" x2="8" y2="13" />
                            <line x1="16" y1="17" x2="8" y2="17" />
                            <polyline points="10 9 9 9 8 9" />
                        </svg>
                        Generar PDF y Enviar
                    </button>
                </div>
            </aside>
        </main>

        <!-- Settings Drawer -->
        <div id="settings-drawer" class="drawer">
            <div class="drawer-header">
                <h3>Ajustes Técnicos</h3>
                <button id="close-settings" class="close-btn">&times;</button>
            </div>
            <div class="drawer-body">
                <div class="control-group">
                    <label>Sensibilidad de Detección: <span id="conf-val">60</span>%</label>
                    <input type="range" id="conf-slider" min="20" max="95" value="60">
                </div>
                <!-- Voice and Grid removed to keep Beta baseline strictly as requested -->

                <hr>

                <div class="control-group">
                    <label>Configuración Telegram</label>
                    <div class="settings-input-group">
                        <input type="text" id="tg-token" value="8535485891:AAEvAOiKwef-PlGffxwcJubUKYuB819sd90"
                            placeholder="Bot Token" class="settings-input">
                        <button class="btn-edit-setting" title="Editar Token">✏️</button>
                    </div>
                    <div class="settings-input-group" style="margin-top: 8px;">
                        <input type="text" id="tg-chatid" value="1577936762" placeholder="Chat ID"
                            class="settings-input">
                        <button class="btn-edit-setting" title="Editar ID">✏️</button>
                    </div>
                </div>

                <hr>
                <!-- Objeto Objetivo and Modo Enfoque removed per request -->
            </div>

            <div class="settings-actions">
                <!-- Reiniciar and Advanced UI removed per request -->
            </div>
        </div>
    </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
