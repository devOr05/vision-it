<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visión IT | Detector en Tiempo Real</title>
    <link rel="stylesheet" href="style.css">
    <!-- TensorFlow.js and Models -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier"></script>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo">Visión IT Dashboard</div>
            <div class="header-actions">
                <button id="toggle-camera" class="icon-btn" title="Cambiar Cámara">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                        <path d="M3 3v5h5" />
                        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
                        <path d="M16 16h5v5" />
                    </svg>
                </button>
                <button id="open-settings" class="icon-btn" title="Ajustes">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.72v.18a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                </button>
            </div>
            <div id="status" class="status">Conectando...</div>
        </header>

        <main class="dashboard-layout">
            <!-- Camera Section -->
            <section class="camera-wall">
                <div class="camera-frame">
                    <video id="video" autoplay playsinline muted></video>
                    <canvas id="canvas"></canvas>

                    <div class="camera-overlay">
                        <div class="counter-badge">
                            <span id="count-num">0</span> objetos
                        </div>
                    </div>
                </div>
            </section>

            <!-- Info & Controls Section -->
            <section class="info-panel">
                <div class="panel-section">
                    <h3>Detectados</h3>
                    <div id="labels-container" class="labels-grid">
                        <!-- Labels will appear here -->
                    </div>
                </div>

                <div class="panel-section actions">
                    <button id="capture-btn" class="btn-secondary">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            style="margin-right: 8px;">
                            <path
                                d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z" />
                            <circle cx="12" cy="13" r="3" />
                        </svg>
                        Capturar
                    </button>

                    <div class="training-status-card">
                        <h4>Estado del Sistema</h4>
                        <p id="ai-mode-text">Modo: Estándar (Inspección General)</p>
                        <div id="custom-prediction" class="custom-prediction-box hidden">
                            Identificación: <span id="custom-label">---</span>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- Settings Drawer -->
        <div id="settings-drawer" class="drawer">
            <div class="drawer-header">
                <h3>Configuración y Entrenamiento</h3>
                <button id="close-settings" class="close-btn">&times;</button>
            </div>
            <div class="drawer-body">
                <div class="control-group">
                    <label>Sensibilidad de Detección: <span id="conf-val">60</span>%</label>
                    <input type="range" id="conf-slider" min="20" max="95" value="60">
                </div>
                <div class="control-group">
                    <label class="switch-label">
                        <input type="checkbox" id="speech-toggle">
                        <span>Notificación por Voz</span>
                    </label>
                </div>

                <div class="control-group">
                    <label class="switch-label">
                        <input type="checkbox" id="count-mode-toggle">
                        <span>Modo Contador (Grid Analysis)</span>
                    </label>
                </div>

                <hr>

                <div class="training-section">
                    <h4>Clasificación Personalizada</h4>
                    <p>Defina nombres y mantenga presionado para capturar muestras:</p>

                    <div class="train-input-group">
                        <div class="train-item">
                            <div class="train-meta">
                                <input type="text" id="name-class-0" value="Objeto 1" placeholder="Nombre Objeto 1">
                                <button class="btn-reset-class" onclick="resetClass(0)"
                                    title="Reiniciar Clase">&times;</button>
                            </div>
                            <div class="train-controls-row">
                                <button id="add-class-0" class="btn-train-action">Capturar Muestra</button>
                                <span class="sample-badge"><span id="samples-0">0</span> fotos</span>
                            </div>
                            <div id="gallery-0" class="sample-gallery"></div>
                        </div>
                        <div class="train-item">
                            <div class="train-meta">
                                <input type="text" id="name-class-1" value="Objeto 2" placeholder="Nombre Objeto 2">
                                <button class="btn-reset-class" onclick="resetClass(1)"
                                    title="Reiniciar Clase">&times;</button>
                            </div>
                            <div class="train-controls-row">
                                <button id="add-class-1" class="btn-train-action">Capturar Muestra</button>
                                <span class="sample-badge"><span id="samples-1">0</span> fotos</span>
                            </div>
                            <div id="gallery-1" class="sample-gallery"></div>
                        </div>
                        <div class="train-item">
                            <div class="train-meta">
                                <input type="text" id="name-class-2" value="Fondo" placeholder="Nombre Fondo">
                                <button class="btn-reset-class" onclick="resetClass(2)"
                                    title="Reiniciar Clase">&times;</button>
                            </div>
                            <div class="train-controls-row">
                                <button id="add-class-2" class="btn-train-action">Capturar Muestra</button>
                                <span class="sample-badge"><span id="samples-2">0</span> fotos</span>
                            </div>
                            <div id="gallery-2" class="sample-gallery"></div>
                        </div>
                    </div>

                    <div class="train-actions">
                        <button id="train-mode-btn" class="btn-outline">Activar IA Personalizada</button>
                        <button id="save-model-btn" class="btn-primary" style="margin-top: 10px;">Guardar
                            Aprendizaje</button>
                        <button id="reset-training" class="btn-danger-link">Reiniciar Base de Datos</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
